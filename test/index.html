<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Streaming Chat</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: white;
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      .chat-container {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }

      .message {
        margin-bottom: 15px;
        line-height: 1.5;
      }

      .user {
        color: #38bdf8;
      }

      .ai {
        color: #22c55e;
        white-space: pre-wrap;
      }

      .input-box {
        display: flex;
        padding: 10px;
        background: #1e293b;
      }

      input {
        flex: 1;
        padding: 10px;
        border: none;
        outline: none;
        border-radius: 8px;
        font-size: 16px;
      }

      button {
        margin-left: 10px;
        padding: 10px 15px;
        border: none;
        background: #22c55e;
        color: black;
        font-weight: bold;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #16a34a;
      }
    </style>
  </head>

  <body>
    <div class="chat-container" id="chat"></div>

    <div class="input-box">
      <input id="input" placeholder="Ask something..." />
      <button onclick="sendMessage()">Send</button>
    </div>

    <script>
      const chat = document.getElementById("chat");
      const input = document.getElementById("input");

      function addMessage(text, className) {
        const div = document.createElement("div");
        div.className = "message " + className;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        return div;
      }

      function sendMessage() {
        const prompt = input.value.trim();
        if (!prompt) return;

        // Show user message
        addMessage("You: " + prompt, "user");

        // Create AI message container
        const aiDiv = addMessage("AI: ", "ai");

        input.value = "";

        const eventSource = new EventSource(
          `http://localhost:8000/api/prompt-stream?prompt=${encodeURIComponent(
            prompt,
          )}`,
        );

        eventSource.onmessage = (event) => {
          if (event.data === "[DONE]") {
            eventSource.close();
            return;
          }

          aiDiv.textContent += event.data;
          chat.scrollTop = chat.scrollHeight;
        };

        eventSource.onerror = () => {
          eventSource.close();
          aiDiv.textContent += "\n[Error receiving response]";
        };
      }
    </script>
  </body>
</html>
